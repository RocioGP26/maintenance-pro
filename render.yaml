# Blueprint Render — https://render.com/docs/blueprint-spec
# Conecta el repo y Render crea el servicio web + variables base.

services:
  - type: web
    name: mantis
    runtime: python
    plan: starter
    # En plan Free de Render no existe preDeployCommand; migraciones van en buildCommand.
    buildCommand: pip install -r requirements.txt && python scripts/migrate_deploy.py
    startCommand: gunicorn run:app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: STORAGE_BACKEND
        value: s3
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ENDPOINT_URL
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: STORAGE_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_SECRET_ACCESS_KEY
        sync: false
