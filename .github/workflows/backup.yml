name: Backup Neon

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Backup
        run: |
          URL="${DATABASE_URL//+psycopg/}"
          pg_dump --format=custom --no-owner --no-acl --file=backup.dump "$URL"
          pg_restore --list backup.dump > backup.manifest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload Backup
        uses: actions/upload-artifact@v4
        with:
          name: roustix-backup
          path: |
            backup.dump
            backup.manifest
          retention-days: 30
