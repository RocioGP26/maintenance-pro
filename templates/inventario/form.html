{% extends "base.html" %}
{% block title %}{% if item %}Editar{% else %}Nuevo{% endif %} repuesto — Mantenimiento Pro{% endblock %}
{% block page_title %}{% if item %}Editar repuesto{% else %}Nuevo repuesto{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card card-dashboard">
      <div class="card-body">
        <form method="post">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">SKU</label>
              <input type="text" name="sku" class="form-control" required value="{{ item.sku if item else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label">Nombre</label>
              <input type="text" name="nombre" class="form-control" required value="{{ item.nombre if item else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label">Categoría</label>
              <input type="text" name="categoria" class="form-control" value="{{ item.categoria if item else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label">Unidad</label>
              <input type="text" name="unidad" class="form-control" value="{{ item.unidad if item else 'pza' }}">
            </div>
            <div class="col-md-4">
              <label class="form-label">Cantidad en stock</label>
              <input type="number" name="cantidad" class="form-control" min="0" value="{{ item.cantidad if item else 0 }}">
            </div>
            <div class="col-md-4">
              <label class="form-label">Stock mínimo</label>
              <input type="number" name="stock_minimo" class="form-control" min="0" value="{{ item.stock_minimo if item else 0 }}">
            </div>
            <div class="col-md-4">
              <label class="form-label">Ubicación en almacén</label>
              <input type="text" name="ubicacion_almacen" class="form-control" value="{{ item.ubicacion_almacen if item else '' }}">
            </div>
          </div>
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{{ url_for('main.inventario_list') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
