<div class="dropdown header-alert-dropdown-wrap">
  <button type="button"
          class="header-alert-bell dropdown-toggle"
          id="headerAlertBell"
          data-bs-toggle="dropdown"
          data-bs-auto-close="outside"
          data-bs-display="static"
          data-bs-offset="0,8"
          aria-expanded="false"
          aria-label="{{ alertas_campana.titulo }}{% if alertas_campana.tiene_alertas %} ({{ alertas_campana.total }}){% endif %}">
    <i class="bi bi-bell" aria-hidden="true"></i>
    {% if alertas_campana.tiene_alertas %}
    <span class="header-alert-dot" aria-hidden="true"></span>
    {% endif %}
    <span class="header-incident-badge" id="incidentNotificationBadge" hidden>0</span>
  </button>
  <div class="dropdown-menu dropdown-menu-end header-alert-menu" aria-labelledby="headerAlertBell">
    <div class="header-alert-menu-head">
      <span class="header-alert-menu-icon" aria-hidden="true"><i class="bi bi-exclamation-circle-fill"></i></span>
      <span class="header-alert-menu-title">{{ alertas_campana.titulo }}</span>
      <button type="button" class="header-alert-menu-close" aria-label="Cerrar" data-header-alert-close>
        <i class="bi bi-x-lg" aria-hidden="true"></i>
      </button>
    </div>
    <ul class="header-alert-menu-list list-unstyled mb-0">
      <li id="incidentNotificationMenuRow" hidden>
        <a href="{{ url_for('main.incidencias_list') }}" class="header-alert-row">
          <span class="header-alert-row-label">Notificaciones de incidencias</span>
          <span class="header-alert-badge header-alert-badge--danger" id="incidentNotificationMenuCount">0</span>
        </a>
      </li>
      {% for item in alertas_campana.filas %}
      <li>
        <a href="{{ item.url }}" class="header-alert-row">
          <span class="header-alert-row-label">{{ item.label }}</span>
          <span class="header-alert-badge header-alert-badge--{{ item.tone }}">
            {% if item.pad %}{{ '%02d'|format(item.count) }}{% else %}{{ item.count }}{% endif %}
          </span>
        </a>
      </li>
      {% else %}
      <li class="header-alert-row header-alert-row--empty text-muted small px-3 py-2">
        Sin alertas por ahora.
      </li>
      {% endfor %}
    </ul>
  </div>
</div>
