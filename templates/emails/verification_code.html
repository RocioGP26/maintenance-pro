<!doctype html>
<html lang="es">
<body style="margin:0;background:#f4f6f8;font-family:Arial,sans-serif;color:#172033">
  <div style="max-width:560px;margin:32px auto;background:#fff;border-radius:12px;padding:32px">
    <h1 style="font-size:22px;margin-top:0">Confirma tu correo en Roustix</h1>
    <p>Hola {{ user.etiqueta() }}, confirma el correo de <strong>{{ empresa.razon_social }}</strong>.</p>
    <p style="font-size:34px;letter-spacing:8px;font-weight:700;text-align:center;background:#f0f4ff;padding:18px;border-radius:8px">{{ code }}</p>
    <p>El código vence en {{ ttl_minutes }} minutos.</p>
    <p style="color:#667085;font-size:13px">Si no solicitaste esta cuenta, ignora este mensaje.</p>
  </div>
</body>
</html>
