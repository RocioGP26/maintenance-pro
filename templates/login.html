<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — Mantenimiento Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
  <style>
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(160deg, #1a202c 0%, #2d3748 45%, #edf2f7 45%); padding: 1.5rem; }
    .login-card { max-width: 420px; width: 100%; border: none; box-shadow: 0 12px 40px rgba(0,0,0,.12); border-radius: .5rem; }
    .login-brand { color: #3182ce; }
  </style>
</head>
<body class="login-page">
  <div class="card login-card">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <i class="bi bi-gear-fill login-brand fs-1"></i>
        <h1 class="h4 fw-bold mt-2 mb-0">Mantenimiento Pro</h1>
        <p class="text-muted small mb-0">Ingresa tus credenciales</p>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} py-2 small" role="alert">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="post" action="{{ url_for('main.login') }}">
        {% if request.args.get('next') %}
        <input type="hidden" name="next" value="{{ request.args.get('next') }}">
        {% endif %}
        <div class="mb-3">
          <label class="form-label" for="username">Usuario</label>
          <input type="text" class="form-control form-control-lg" id="username" name="username" required autocomplete="username" autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Contraseña</label>
          <input type="password" class="form-control form-control-lg" id="password" name="password" required autocomplete="current-password">
        </div>
        <div class="mb-4 form-check">
          <input type="checkbox" class="form-check-input" id="remember" name="remember" value="1">
          <label class="form-check-label" for="remember">Recordarme en este equipo</label>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100">Entrar</button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
