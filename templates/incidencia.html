{% extends "base.html" %}
{% block title %}Reportar incidencia — {{ app_name }}{% endblock %}
{% block page_title %}Reportar incidencia{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card card-dashboard border-danger border-opacity-25">
      <div class="card-body">
        <p class="text-muted">Registra una incidencia o falla para que el equipo de mantenimiento pueda dar seguimiento.</p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Título breve</label>
            <input type="text" name="titulo" class="form-control" required placeholder="Ej. Vibración anómala en compresor">
          </div>
          <div class="mb-3">
            <label class="form-label">Equipo relacionado (opcional)</label>
            <select name="machine_id" class="form-select">
              <option value="">— No especificado —</option>
              {% for m in machines %}
                <option value="{{ m.id }}">{{ m.codigo }} — {{ m.nombre }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea name="descripcion" class="form-control" rows="4" placeholder="Detalle del problema, hora aproximada, síntomas…"></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger"><i class="bi bi-send"></i> Enviar reporte</button>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">Volver al dashboard</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
